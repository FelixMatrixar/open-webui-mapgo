<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: ui-sans-serif, system-ui, sans-serif; background: transparent; padding: 0.75rem; }
        .itinerary-card { background: #ffffff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; }
        @media (prefers-color-scheme: dark) { .itinerary-card { background: #1c1c1e; border-color: rgba(255,255,255,0.1); color: #f5f5f7; } }
        
        .map-area { height: 250px; position: relative; background: #f5f5f7; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
        .map-area iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; pointer-events: auto; }
        
        .card-body { padding: 20px; }
        .itinerary-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        
        /* Timeline UI */
        .timeline { position: relative; padding-left: 20px; margin-bottom: 20px; }
        .timeline::before { content: ''; position: absolute; left: 6px; top: 6px; bottom: 6px; width: 2px; background: #e5e7eb; }
        @media (prefers-color-scheme: dark) { .timeline::before { background: #333; } }
        
        .stop { position: relative; margin-bottom: 16px; font-size: 14px; line-height: 1.4; }
        .stop:last-child { margin-bottom: 0; }
        .stop::before { content: ''; position: absolute; left: -20px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: #007aff; border: 2px solid #fff; }
        @media (prefers-color-scheme: dark) { .stop::before { border-color: #1c1c1e; } }
        
        .stop-origin::before { background: #34c759; } /* Green for start */
        .stop-destination::before { background: #ff3b30; } /* Red for end */
        
        .stop-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .stop-name { font-weight: 500; }

        .action-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 0; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; background: #007aff; color: white; text-decoration: none; transition: background 0.2s; }
        .action-btn:hover { background: #005bb5; }
    </style>
</head>
<body>
    <div class="itinerary-card">
        <div class="map-area">
            <iframe src="{{ embed_url }}" allowfullscreen loading="lazy"></iframe>
        </div>
        <div class="card-body">
            <div class="itinerary-title">🗺️ Your Day Trip Plan</div>
            
            <div class="timeline">
                {% for stop in all_stops %}
                    <div class="stop {% if loop.first %}stop-origin{% elif loop.last %}stop-destination{% endif %}">
                        <div class="stop-label">
                            {% if loop.first %}Start{% elif loop.last %}Destination{% else %}Stop {{ loop.index0 }}{% endif %}
                        </div>
                        <div class="stop-name">{{ stop }}</div>
                    </div>
                {% endfor %}
            </div>
            
            <a href="{{ dir_url }}" onclick="window.open(this.href, '_blank'); return false;" class="action-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                Open Full Route in Maps
            </a>
        </div>
    </div>
    <script>
        function reportHeight() {
            // Calculate total height of the card + a little buffer padding
            const h = document.documentElement.scrollHeight + 15;
            parent.postMessage({ type: 'iframe:height', height: h }, '*');
        }
        // Tell Open WebUI to resize when the map loads
        window.addEventListener('load', reportHeight);
        // Tell Open WebUI to resize if the content shifts
        new ResizeObserver(reportHeight).observe(document.body);
    </script>
</body>
</html>
